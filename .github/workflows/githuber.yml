name: GitHuber (Nightly)

on:
  schedule:
    # 终极错峰时间：UTC 11:43 (日本时间 20:43)。避开所有整点排队大军！
    - cron: '43 11 * * *'
  workflow_dispatch: # 允许你在 GitHub 网页上手动点火

jobs:
  execute-hunt:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: ⚙️ Setup Python 3.10 Engine
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: ⛽ Inject Fuel (Install Dependencies)
        run: pip install -r requirements.txt

      - name: 🚀 IGNITION! (Run GitHuber)
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          OBSIDIAN_PATH: "./"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python githuber.py