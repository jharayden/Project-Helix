name: Autonomous Daily Hunter

on:
  schedule:
    
    - cron: '17 22 * * *'
  workflow_dispatch: 

jobs:
  execute-hunt:
    runs-on: ubuntu-latest # 使用 GitHub 免费提供的超级 Linux 服务器

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: ⚙️ Setup Python 3.10 Engine
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: ⛽ Inject Fuel (Install Dependencies)
        run: pip install -r requirements.txt

      - name: 🚀 IGNITION! (Run Agent)
        env: # 从云端保险箱提取机密
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          TARGET_TOPIC: ${{ vars.TARGET_TOPIC }} # <--- V2.1 新增：允许用户在 GitHub Variables 中配置专属主题
          OBSIDIAN_PATH: "./" 
        run: python hunter.py