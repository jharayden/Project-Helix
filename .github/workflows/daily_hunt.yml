name: Autonomous Daily Hunter

on:
  schedule:
    - cron: '17 22 * * *'
  workflow_dispatch: 

jobs:
  execute-hunt:
    runs-on: ubuntu-latest # 使用 GitHub 免费提供的超级 Linux 服务器

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4 # [升级到 v4]

      - name: ⚙️ Setup Python 3.10 Engine
        uses: actions/setup-python@v5 # [升级到 v5]
        with:
          python-version: '3.10'
          cache: 'pip' # [新增] 缓存依赖，让启动速度快 3 倍

      - name: ⛽ Inject Fuel (Install Dependencies)
        run: pip install -r requirements.txt

      - name: 🚀 IGNITION! (Run Agent)
        env: 
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          TARGET_TOPIC: ${{ vars.TARGET_TOPIC }} 
          OBSIDIAN_PATH: "./" 
        run: python hunter.py

      - name: 📦 Push to GitHub Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Arxiv_Papers/ GitHuber/ Vault/ || true
          git commit -m "chore: auto-sync nightly intelligence reports" || echo "No new files to sync"
          git push